<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>백민재 ❤️ 김수정, 결혼식에 당신을 초대합니다.</title>

  <!-- Open Graph / KakaoTalk Preview -->
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="ko_KR" />
  <meta property="og:title" content="백민재 ❤️ 김수정, 결혼식에 당신을 초대합니다." />
  <meta property="og:description" content="2026년 4월 25일, 오후 1시 경민웨딩홀(6층, 그레이스홀)" />
  <!-- 아래 og:image의 주소를 실제 배포 주소에 맞게 바꿔 주세요. -->
  <meta property="og:image" content="https://akswo.github.io/wedding-invite/wedding-photo.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="백민재 ❤️ 김수정, 결혼식에 당신을 초대합니다." />
  <meta name="twitter:description" content="2026년 4월 25일, 오후 1시 경민웨딩홀(6층, 그레이스홀)" />
  <meta name="twitter:image" content="https://akswo.github.io/wedding-invite/wedding-photo.png" />

  <style>
    :root {
      --bg: #fff9fb;
      --card: rgba(255, 255, 255, 0.86);
      --text: #3c2f35;
      --sub: #7b6770;
      --line: #f0d8e2;
      --accent: #e25573;
      --accent-soft: #ffe7ee;
      --shadow: 0 14px 36px rgba(141, 72, 96, 0.12);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top left, #fff1f5 0%, transparent 30%),
        radial-gradient(circle at top right, #fff3ec 0%, transparent 32%),
        linear-gradient(180deg, #fffafc 0%, #fff5f8 100%);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px 48px;
    }

    .wrap {
      width: 100%;
      max-width: 430px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .hero {
      padding: 44px 24px 28px;
      text-align: center;
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,255,255,0.92)),
        linear-gradient(135deg, #fff0f4 0%, #fff8f1 100%);
    }

    .hero-image {
      width: 100%;
      max-width: 320px;
      display: block;
      margin: 0 auto 18px;
      border-radius: 20px;
    }

    .eyebrow {
      font-size: 13px;
      letter-spacing: 0.18em;
      color: var(--sub);
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.35;
      font-weight: 700;
      word-break: keep-all;
    }

    .heart {
      color: #e11d48;
      padding: 0 4px;
    }

    .subtitle {
      margin: 16px auto 0;
      font-size: 15px;
      line-height: 1.8;
      color: var(--sub);
      max-width: 280px;
      word-break: keep-all;
    }

    .section {
      padding: 24px;
      border-top: 1px solid var(--line);
    }

    .section-title {
      margin: 0 0 16px;
      font-size: 14px;
      letter-spacing: 0.12em;
      color: var(--sub);
      text-transform: uppercase;
    }

    .info-box {
      background: #fff;
      border: 1px solid #f6e2e8;
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.04);
    }

    .date {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      word-break: keep-all;
    }

    .place {
      margin-top: 10px;
      text-align: center;
      color: var(--sub);
      font-size: 15px;
      line-height: 1.7;
      word-break: keep-all;
    }

    .invite-text {
      font-size: 15px;
      line-height: 2;
      text-align: center;
      color: #5b4a52;
      word-break: keep-all;
    }

    .badge {
      display: inline-block;
      margin: 18px auto 0;
      padding: 10px 16px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }

    .footer {
      padding: 22px;
      text-align: center;
      color: #927d86;
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 360px) {
      h1 { font-size: 26px; }
      .date { font-size: 20px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="hero">
        <img src="wedding-photo.png" alt="신랑 신부 일러스트" class="hero-image" />
        <div class="eyebrow">WEDDING INVITATION</div>
        <h1>
          백민재 <span class="heart">❤️</span> 김수정<br />
          결혼식에 당신을 초대합니다.
        </h1>
        <p class="subtitle">
          두 사람이 사랑으로 하나 되는 날,
          소중한 걸음으로 함께 축복해 주세요.
        </p>
      </div>

      <div class="section">
        <h2 class="section-title">Wedding Day</h2>
        <div class="info-box">
          <div class="date">2026년 4월 25일 토요일<br />오후 1시</div>
          <div class="place">경민웨딩홀 6층, 그레이스홀</div>
        </div>
      </div>

      <div class="section">
        <h2 class="section-title">Invitation</h2>
        <div class="invite-text">
          함께한 시간 속에서 사랑을 키워온 두 사람이<br />
          이제 평생을 약속하려 합니다.<br />
          귀한 발걸음으로 오셔서<br />
          따뜻한 축복을 나눠 주시면 감사하겠습니다.
          <div class="badge">백민재 · 김수정</div>
        </div>
      </div>

    </section>
  </main>
</body>
</html>
